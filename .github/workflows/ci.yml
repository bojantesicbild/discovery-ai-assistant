name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  backend-unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock
      # --no-install-project skips building the backend package itself
      # (no hatch wheel config yet) while still installing every dep
      # pinned in uv.lock. Dev extras gives us pytest + pytest-asyncio.
      - run: uv sync --frozen --no-install-project --extra dev
      # uv run tries to re-install the project, which fails because
      # there's no hatch wheel config yet — bypass by invoking the
      # venv python directly.
      - run: .venv/bin/python -m pytest tests/unit -v

  backend-migration-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: discovery_user
          POSTGRES_PASSWORD: discovery_pass
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock
      - run: uv sync --frozen --no-install-project --extra dev
      # The script shells out to `alembic` — prepend the venv bin so
      # it resolves without needing an activation step.
      - run: .venv/bin/python tests/check_migrations.py
        env:
          PATH: ${{ github.workspace }}/backend/.venv/bin:/usr/local/bin:/usr/bin:/bin
