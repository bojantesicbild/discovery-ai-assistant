kind: requirement
display_name: Requirement
prefix: BR
id_field: id
folder: docs/discovery/requirements
model: app.models.extraction.Requirement

fields:
  - key: id
    db_column: req_id
    type: string
    required: true
    description: "BR-NNN identifier (auto-generated by extractor)"

  - key: title
    type: string
    required: true
    description: "Short descriptive name (<70 chars)"

  - key: type
    type: enum
    values: [functional, non_functional]
    required: true
    default: functional

  - key: priority
    type: enum
    values: [must, should, could, wont]
    required: true
    default: should

  - key: status
    type: enum
    values: [draft, proposed, discussed, confirmed, rejected]
    required: true
    default: proposed

  - key: confidence
    type: enum
    values: [low, medium, high]
    required: true
    default: medium

  - key: description
    type: text
    required: true
    description: "Body of the requirement — also rendered as the H1 paragraph"

  - key: user_perspective
    type: text
    required: false
    frontmatter: false
    description: "As a [role], I want [X], so that [Y]"

  - key: business_rules
    type: list
    item_type: string
    required: false
    frontmatter: false

  - key: edge_cases
    type: list
    item_type: string
    required: false
    frontmatter: false

  - key: acceptance_criteria
    type: list
    item_type: string
    required: false
    frontmatter: false
    description: "Testable AC blocks in GIVEN/WHEN/THEN form, each string is one AC. Extracted at ingest time so story-story-agent can lift them verbatim into PBIs and qa-analysis-planning-agent can triage them directly."

  - key: source_doc
    type: string
    required: false
    description: "Filename of the document this was extracted from"

  - key: source_quote
    type: text
    required: true
    frontmatter: false
    description: "Verbatim quote (≥10 chars)"

  - key: source_person
    type: string
    required: false
    description: "Stakeholder who said it"

  - key: source_doc_id
    db_column: source_doc_id
    type: uuid_ref
    frontmatter: false

  - key: source_raw
    type: string
    required: false
    db_column: null
    description: "Relative path to .raw/ file (computed at write time)"

  - key: source_url
    type: string
    required: false
    db_column: null
    description: "Web URL when source has one (Gmail, Drive)"

  - key: source_origin
    type: string
    required: false
    db_column: null
    description: "Connector that ingested the source (gmail, google_drive, upload, slack)"

  - key: version
    type: int
    required: true
    default: 1

  - key: sources
    type: list
    item_type: object
    required: false
    frontmatter: false
    description: "Per-source merge history: [{doc_id, filename, quote, added_at}]"

  - key: date
    type: date
    required: true
    default: today

sections:
  - name: body
    format: paragraphs
    source_field: description
    required: true

  - name: Source
    format: blockquote
    source_field: source_quote
    required: false

  - name: User Perspective
    format: paragraphs
    source_field: user_perspective
    required: false

  - name: Business Rules
    format: bullets
    generated_from: business_rules
    required: false

  - name: Acceptance Criteria
    format: bullets
    generated_from: acceptance_criteria
    required: false

  - name: Edge Cases
    format: bullets
    generated_from: edge_cases
    required: false

  - name: People
    format: bullets
    generated_from: source_person
    required: false

  - name: Related
    format: wikilinks
    generated_from: relationships.co-extracted
    required: false

  - name: Sources
    format: bullets
    generated_from: sources
    required: false

relationships:
  - name: co-extracted
    target: requirement
    derived: same_source_doc

  - name: blocks
    target: gap
    derived: gap.blocked_reqs contains self.id

  - name: derived-from
    target: document
    derived: source_doc_id

classification:
  cssclasses: [requirement, "node-green"]
  default_tags: [requirement, "{{priority}}", "{{status}}"]

view:
  dataview_columns: [priority, status, confidence, source_person, version]
  default_sort: [priority asc, status asc, version desc]
  group_by: priority

extraction_prompt: |
  Extract requirements as items the system shall do or be.

  For each requirement, capture:
  - title: short descriptive name (<70 chars)
  - type: functional or non_functional
  - priority: infer from language ("must"/"critical" -> must, "should" -> should,
              "nice to have"/"could" -> could, "out of scope" -> wont)
  - description: 1-3 sentences, no marketing language
  - user_perspective: "As a [role], I want [X], so that [Y]" (generate if not explicit)
  - business_rules: specific rules mentioned
  - edge_cases: edge cases mentioned or obvious ones
  - acceptance_criteria: testable ACs in GIVEN/WHEN/THEN form (one per list entry).
                        Include when the source describes observable behavior clear
                        enough to write a test for. Format each as:
                          "AC1: Title — GIVEN precondition WHEN action THEN outcome"
                        Or split across lines within the string if that reads better.
                        Skip if the source is too abstract for concrete ACs.
  - source_quote: EXACT verbatim quote from the document (≥10 chars)
  - status: proposed (default), discussed (mentioned in multiple docs), confirmed (client EXPLICITLY confirmed)
  - confidence: high (explicit), medium (implied), low (inferred)

  Avoid extracting:
  - Already-existing requirements (return existing_match: BR-XXX instead)
  - Speculative "we might want to" statements (those are gaps, not reqs)
  - Implementation details masquerading as requirements
