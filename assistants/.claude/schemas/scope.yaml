kind: scope
display_name: Scope item
prefix: SCO
id_field: id
folder: docs/discovery/scope
model: app.models.extraction.ScopeItem

fields:
  - key: id
    type: string
    required: true
    db_column: null
    description: "SCO-NNN — assigned by writer"

  - key: description
    type: text
    required: true

  - key: in_scope
    type: bool
    required: true

  - key: rationale
    type: text
    required: true
    frontmatter: false

  - key: source_doc
    type: string
    required: false

  - key: source_doc_id
    db_column: source_doc_id
    type: uuid_ref
    frontmatter: false

  - key: date
    type: date
    required: true
    default: today

sections:
  - name: body
    format: paragraphs
    source_field: description
    required: true

  - name: Rationale
    format: paragraphs
    source_field: rationale
    required: true

classification:
  cssclasses: [scope, "node-{{in_scope_color}}"]
  default_tags: [scope, "in_scope:{{in_scope}}"]

view:
  dataview_columns: [in_scope, description]
  default_sort: [in_scope desc, date desc]
  group_by: in_scope

extraction_prompt: |
  DO NOT extract individual scope items during document extraction.

  Scope boundaries (what's in/out of MVP) should be captured as prose
  in the document_summary field instead. The MVP Scope Freeze handoff
  document is the canonical place for scope — it's a curated narrative,
  not a list of tracked items.

  If the pipeline receives scope items from legacy extractions they'll
  still be stored, but new extractions should NOT produce them. Include
  scope-relevant statements in the document_summary instead, e.g.:
  "Client confirmed mobile is out of scope for v1, dashboard-only MVP."
