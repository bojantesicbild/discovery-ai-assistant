kind: scope
display_name: Scope item
prefix: SCO
id_field: id
folder: docs/discovery/scope
model: app.models.extraction.ScopeItem

fields:
  - key: id
    type: string
    required: true
    db_column: null
    description: "SCO-NNN — assigned by writer"

  - key: description
    type: text
    required: true

  - key: in_scope
    type: bool
    required: true

  - key: rationale
    type: text
    required: true
    frontmatter: false

  - key: source_doc
    type: string
    required: false

  - key: source_doc_id
    db_column: source_doc_id
    type: uuid_ref
    frontmatter: false

  - key: date
    type: date
    required: true
    default: today

sections:
  - name: body
    format: paragraphs
    source_field: description
    required: true

  - name: Rationale
    format: paragraphs
    source_field: rationale
    required: true

classification:
  cssclasses: [scope, "node-{{in_scope_color}}"]
  default_tags: [scope, "in_scope:{{in_scope}}"]

view:
  dataview_columns: [in_scope, description]
  default_sort: [in_scope desc, date desc]
  group_by: in_scope

extraction_prompt: |
  Extract scope items as things the client explicitly said are IN or OUT
  of the MVP.

  For each scope item, capture:
  - description: the feature or capability
  - in_scope: true (client said "yes, in MVP") or false ("not in MVP")
  - rationale: why it's in or out

  Only extract scope items when there's an EXPLICIT in/out statement.
  Don't infer scope from priority — that's what `priority` is for on
  requirements.
