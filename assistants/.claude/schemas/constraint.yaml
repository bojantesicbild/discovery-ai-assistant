kind: constraint
display_name: Constraint
prefix: CON
id_field: id
folder: docs/discovery/constraints
model: app.models.extraction.Constraint

fields:
  - key: id
    type: string
    required: true
    db_column: null
    description: "CON-NNN — assigned by writer, not stored in DB"

  - key: title
    type: string
    required: false
    db_column: null
    description: "Auto-derived from type + description prefix by the writer"

  - key: type
    type: enum
    values: [budget, timeline, technology, regulatory, organizational]
    required: true

  - key: description
    type: text
    required: true

  - key: impact
    type: text
    required: true
    frontmatter: false
    description: "How the constraint limits the project"

  - key: status
    type: enum
    values: [confirmed, assumed, negotiable]
    required: true
    default: assumed

  - key: source_quote
    type: text
    required: true
    frontmatter: false

  - key: source_person
    type: string
    required: false
    description: "Stakeholder who imposed or stated the constraint. Lets the PM know who to ask for a workaround."

  - key: affects_reqs
    type: list
    item_type: string
    required: false
    frontmatter: false
    description: "BR ids this constraint shapes, e.g. ['BR-004', 'BR-007']. Explicit link to the requirements at risk if this constraint stays."

  - key: workaround
    type: text
    required: false
    frontmatter: false
    description: "Short mitigation note — the negotiation lever when pushing back. Skip if the source has no workaround discussion."

  - key: source_doc
    type: string
    required: false

  - key: source_doc_id
    db_column: source_doc_id
    type: uuid_ref
    frontmatter: false

  - key: source_raw
    type: string
    required: false
    db_column: null

  - key: date
    type: date
    required: true
    default: today

sections:
  - name: body
    format: paragraphs
    source_field: description
    required: true

  - name: Impact
    format: paragraphs
    source_field: impact
    required: true

  - name: Source
    format: blockquote
    source_field: source_quote
    required: false

  - name: Workaround
    format: paragraphs
    source_field: workaround
    required: false

  - name: Affected Requirements
    format: wikilinks
    generated_from: affects_reqs
    required: false

classification:
  cssclasses: [constraint, "node-cyan"]
  default_tags: [constraint, "{{type}}", "{{status}}"]

view:
  dataview_columns: [type, status, source_doc]
  default_sort: [type asc, status asc]
  group_by: type

extraction_prompt: |
  Extract constraints as things that LIMIT what the project can do.

  For each constraint, capture:
  - type: budget / timeline / technology / regulatory / organizational
  - description: what the constraint is (1 sentence)
  - impact: how it limits the project (1-2 sentences)
  - source_quote: verbatim quote (≥10 chars)
  - source_person: stakeholder who imposed / stated it, when named in the source
  - affects_reqs: list of BR ids this constraint shapes (e.g. ['BR-004']).
                  Only include when the source explicitly links the constraint
                  to specific requirements — don't guess.
  - workaround: short mitigation note when the source discusses one.
                Format: 'option considered — reason it fails'. Skip otherwise.
  - status: confirmed (client stated as fact), assumed (we inferred),
            negotiable (client open to changing it)

  Constraints are things that NARROW the solution space. They are NOT
  requirements (what the system shall do) — they are walls the system
  must stay within.
