kind: constraint
display_name: Constraint
prefix: CON
id_field: id
folder: docs/discovery/constraints
model: app.models.extraction.Constraint

fields:
  - key: id
    type: string
    required: true
    db_column: null
    description: "CON-NNN — assigned by writer, not stored in DB"

  - key: title
    type: string
    required: false
    db_column: null
    description: "Auto-derived from type + description prefix by the writer"

  - key: type
    type: enum
    values: [budget, timeline, technology, regulatory, organizational]
    required: true

  - key: description
    type: text
    required: true

  - key: impact
    type: text
    required: true
    frontmatter: false
    description: "How the constraint limits the project"

  - key: status
    type: enum
    values: [confirmed, assumed, negotiable]
    required: true
    default: assumed

  - key: source_quote
    type: text
    required: true
    frontmatter: false

  - key: source_doc
    type: string
    required: false

  - key: source_doc_id
    db_column: source_doc_id
    type: uuid_ref
    frontmatter: false

  - key: source_raw
    type: string
    required: false
    db_column: null

  - key: date
    type: date
    required: true
    default: today

sections:
  - name: body
    format: paragraphs
    source_field: description
    required: true

  - name: Impact
    format: paragraphs
    source_field: impact
    required: true

  - name: Source
    format: blockquote
    source_field: source_quote
    required: false

classification:
  cssclasses: [constraint, "node-cyan"]
  default_tags: [constraint, "{{type}}", "{{status}}"]

view:
  dataview_columns: [type, status, source_doc]
  default_sort: [type asc, status asc]
  group_by: type

extraction_prompt: |
  Extract constraints as things that LIMIT what the project can do.

  For each constraint, capture:
  - type: budget / timeline / technology / regulatory / organizational
  - description: what the constraint is (1 sentence)
  - impact: how it limits the project (1-2 sentences)
  - source_quote: verbatim quote (≥10 chars)
  - status: confirmed (client stated as fact), assumed (we inferred),
            negotiable (client open to changing it)

  Constraints are things that NARROW the solution space. They are NOT
  requirements (what the system shall do) — they are walls the system
  must stay within.
