kind: contradiction
display_name: Contradiction
prefix: CTR
id_field: id
folder: docs/discovery/contradictions
model: app.models.extraction.Contradiction

fields:
  - key: id
    type: string
    required: true
    db_column: null
    description: "CTR-NNN — assigned by writer"

  - key: title
    type: string
    required: true
    description: "Short headline for the contradiction (≤60 chars) — e.g. 'MVP handoff documents', 'Extraction model'."

  - key: side_a
    type: text
    required: true
    frontmatter: false
    description: "First conflicting statement — what one source/person said."

  - key: side_b
    type: text
    required: true
    frontmatter: false
    description: "Second conflicting statement — what the other source/person said."

  - key: area
    type: enum
    required: false
    values: [tech-stack, scope, governance, timeline, budget, other]
    description: "Domain category."

  - key: side_a_source
    type: string
    required: false
    description: "Document / source reference for side A (filename or vault path)."

  - key: side_a_person
    type: string
    required: false
    description: "Person who holds side A."

  - key: side_b_source
    type: string
    required: false
    description: "Document / source reference for side B."

  - key: side_b_person
    type: string
    required: false
    description: "Person who holds side B."

  - key: explanation
    type: text
    required: false
    frontmatter: false
    description: "Optional context composed from title + side_a + side_b. Populated server-side; agents usually don't need to set this."

  - key: resolved
    type: bool
    required: true
    default: false

  - key: resolution_note
    type: text
    required: false
    frontmatter: false

  - key: source_doc
    type: string
    required: false

  - key: source_doc_id
    db_column: source_doc_id
    type: uuid_ref
    frontmatter: false

  - key: date
    type: date
    required: true
    default: today

sections:
  - name: Conflicting statements
    format: paragraphs
    generated_from: side_a_and_side_b
    required: true

  - name: Resolution
    format: paragraphs
    source_field: resolution_note
    required: false

classification:
  cssclasses: [contradiction, "node-red"]
  default_tags: [contradiction, "resolved:{{resolved}}", "area:{{area}}"]

view:
  dataview_columns: [resolved, area, title]
  default_sort: [resolved asc, date desc]
  group_by: area

extraction_prompt: |
  A contradiction is when two statements can't both be true. The
  discovery-extraction-agent captures them as free-form two-sided
  disagreements:
  - title: short headline ("MVP handoff documents", "Extraction model")
  - side_a: first conflicting statement, what one source/person said
  - side_b: second conflicting statement, what the other source/person said
  - area: tech-stack / scope / governance / timeline / budget / other
  - resolved: false until a human picks a side
  - resolution_note: how it was resolved (when resolved)

  Extract contradictions both WITHIN a document (one person says X, another
  says Y) and ACROSS documents (this doc contradicts an earlier one — the
  agent reads existing data via get_requirements / get_gaps to cross-check).
