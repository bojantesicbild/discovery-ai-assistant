kind: contradiction
display_name: Contradiction
prefix: CTR
id_field: id
folder: docs/discovery/contradictions
model: app.models.extraction.Contradiction

fields:
  - key: id
    type: string
    required: true
    db_column: null
    description: "CTR-NNN — assigned by writer"

  - key: title
    type: string
    required: true
    description: "Short headline for the contradiction (≤60 chars) — e.g. 'MVP handoff documents', 'Extraction model'."

  - key: side_a
    type: text
    required: true
    frontmatter: false
    description: "First conflicting statement — what one source/person said."

  - key: side_b
    type: text
    required: true
    frontmatter: false
    description: "Second conflicting statement — what the other source/person said."

  - key: area
    type: enum
    required: false
    values: [tech-stack, scope, governance, timeline, budget, other]
    description: "Domain category."

  - key: side_a_source
    type: string
    required: false
    description: "Document / source reference for side A (filename or vault path)."

  - key: side_a_person
    type: string
    required: false
    description: "Person who holds side A."

  - key: side_b_source
    type: string
    required: false
    description: "Document / source reference for side B."

  - key: side_b_person
    type: string
    required: false
    description: "Person who holds side B."

  - key: impact_summary
    type: text
    required: false
    frontmatter: false
    description: "Why the contradiction matters — what's at stake if it stays unresolved (blocked decisions, scope/budget/quality risk, downstream BRs that depend on the call). 1–3 sentences."

  - key: resolution_options
    type: list
    required: false
    frontmatter: false
    description: |
      Concrete paths to resolve the contradiction. Each entry is a single
      string formatted as "<option> — <pros / cons or recommendation>".
      Examples: "Run benchmark on 50 sample docs — pick model by quality
      threshold", "Stay on Haiku, fall back to Sonnet on confidence<medium —
      hybrid keeps cost down but adds runtime branching", "Revert to Sonnet
      — safe but breaks the 10x cost commitment". Only emit when the source
      genuinely discusses options or trade-offs; do not fabricate.

  - key: explanation
    type: text
    required: false
    frontmatter: false
    description: "Optional context composed from title + side_a + side_b. Populated server-side; agents usually don't need to set this."

  - key: resolved
    type: bool
    required: true
    default: false

  - key: resolution_note
    type: text
    required: false
    frontmatter: false

  - key: source_doc
    type: string
    required: false

  - key: source_doc_id
    db_column: source_doc_id
    type: uuid_ref
    frontmatter: false

  - key: date
    type: date
    required: true
    default: today

sections:
  - name: Conflicting statements
    format: paragraphs
    generated_from: side_a_and_side_b
    required: true

  - name: Impact
    format: paragraphs
    source_field: impact_summary
    required: false

  - name: Resolution options
    format: bullets
    source_field: resolution_options
    required: false

  - name: Resolution
    format: paragraphs
    source_field: resolution_note
    required: false

classification:
  cssclasses: [contradiction, "node-red"]
  default_tags: [contradiction, "resolved:{{resolved}}", "area:{{area}}"]

view:
  dataview_columns: [resolved, area, title]
  default_sort: [resolved asc, date desc]
  group_by: area

extraction_prompt: |
  A contradiction is when two statements can't both be true. The
  discovery-extraction-agent captures them as free-form two-sided
  disagreements with enough context that a PM staring at the doc can
  understand what's at stake and what their options are.

  Required fields:
  - title: short headline ("MVP handoff documents", "Extraction model")
  - side_a: first conflicting statement, what one source/person said
  - side_b: second conflicting statement, what the other source/person said
  - area: tech-stack / scope / governance / timeline / budget / other
  - side_a_source / side_a_person, side_b_source / side_b_person: provenance

  Descriptive fields — populate when the source actually discusses them.
  Do NOT invent. Leave empty rather than hallucinate.

  - impact_summary: WHY the contradiction matters. What's blocked, what's at
    risk, who's affected if no one decides. 1–3 sentences. The grain is
    "consequences of staying unresolved", not a restatement of side_a/side_b.

  - resolution_options: concrete paths to resolve, each with a short
    pros/cons or recommendation tail after an em-dash. Only emit when the
    source genuinely discusses options or trade-offs; otherwise omit.

  WRONG (no impact, no options — PM has to guess what to do):
    title: "Extraction model"
    side_a: "Earlier decision: use Claude Sonnet for extraction quality."
    side_b: "Milan Kovac decided to use Haiku for 10x cost reduction.
             Quality vs. cost trade-off unresolved."

  RIGHT (impact + options — PM can act):
    title: "Extraction model"
    side_a: "Earlier decision: use Claude Sonnet for extraction quality."
    side_b: "Milan Kovac decided to use Haiku for 10x cost reduction.
             Quality vs. cost trade-off unresolved."
    impact_summary: "Affects every BR depending on extraction accuracy
      (BR-001 budget tracking, BR-003 offline review). If Haiku quality
      drops below the confirmed-finding threshold, the client review
      portal surfaces wrong data; if we revert to Sonnet, Milan's 10x
      cost commitment to the client breaks."
    resolution_options:
      - "Run a 50-document benchmark — pick the model by quality threshold,
         empirical and lowest risk"
      - "Hybrid: Haiku by default, fall back to Sonnet on confidence<medium —
         keeps cost down but adds runtime branching"
      - "Stay on Haiku — accept quality loss as MVP trade-off, revisit post-launch"

  Extract contradictions both WITHIN a document (one person says X, another
  says Y) and ACROSS documents (this doc contradicts an earlier one — the
  agent reads existing data via get_requirements / get_gaps to cross-check).
