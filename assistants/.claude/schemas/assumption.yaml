kind: assumption
display_name: Assumption
prefix: ASM
id_field: id
folder: docs/discovery/assumptions
model: app.models.extraction.Assumption

fields:
  - key: id
    type: string
    required: true
    db_column: null
    description: "ASM-NNN — assigned by writer"

  - key: statement
    type: text
    required: true

  - key: basis
    type: text
    required: true
    frontmatter: false
    description: "Why we assume this"

  - key: risk_if_wrong
    type: text
    required: true
    frontmatter: false

  - key: needs_validation_by
    type: string
    required: false

  - key: validated
    type: bool
    required: true
    default: false

  - key: source_doc
    type: string
    required: false

  - key: source_doc_id
    db_column: source_doc_id
    type: uuid_ref
    frontmatter: false

  - key: date
    type: date
    required: true
    default: today

sections:
  - name: body
    format: paragraphs
    source_field: statement
    required: true

  - name: Basis
    format: paragraphs
    source_field: basis
    required: true

  - name: Risk if wrong
    format: paragraphs
    source_field: risk_if_wrong
    required: true

  - name: Validation
    format: paragraphs
    source_field: needs_validation_by
    required: false

classification:
  cssclasses: [assumption, "node-orange"]
  default_tags: [assumption, "validated:{{validated}}"]

view:
  dataview_columns: [validated, needs_validation_by, risk_if_wrong]
  default_sort: [validated asc, date desc]
  group_by: validated

extraction_prompt: |
  Extract assumptions as beliefs we are operating on but have NOT confirmed.

  For each assumption, capture:
  - statement: what we believe (1 sentence)
  - basis: why we believe it (industry norm, similar project, client hint…)
  - risk_if_wrong: what breaks if the assumption fails
  - needs_validation_by: who or what would resolve the assumption

  An assumption is different from a constraint: a constraint is a known
  limit; an assumption is a guess about a limit. Assumptions should
  eventually become either confirmed constraints or rejected.
