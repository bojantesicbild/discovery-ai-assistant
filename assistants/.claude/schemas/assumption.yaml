kind: assumption
display_name: Assumption
prefix: ASM
id_field: id
folder: docs/discovery/assumptions
model: app.models.extraction.Assumption

fields:
  - key: id
    type: string
    required: true
    db_column: null
    description: "ASM-NNN — assigned by writer"

  - key: statement
    type: text
    required: true

  - key: basis
    type: text
    required: true
    description: "Why we assume this — surfaced in frontmatter so Obsidian Dataview and MCP queries can filter on it"

  - key: risk_if_wrong
    type: text
    required: true
    description: "What breaks if this assumption is wrong — surfaced in frontmatter for quick triage and queryability"

  - key: needs_validation_by
    type: string
    required: false

  - key: validated
    type: bool
    required: true
    default: false

  - key: source_doc
    type: string
    required: false

  - key: source_doc_id
    db_column: source_doc_id
    type: uuid_ref
    frontmatter: false

  - key: date
    type: date
    required: true
    default: today

sections:
  - name: body
    format: paragraphs
    source_field: statement
    required: true

  - name: Basis
    format: paragraphs
    source_field: basis
    required: true

  - name: Risk if wrong
    format: paragraphs
    source_field: risk_if_wrong
    required: true

  - name: Validation
    format: paragraphs
    source_field: needs_validation_by
    required: false

classification:
  cssclasses: [assumption, "node-orange"]
  default_tags: [assumption, "validated:{{validated}}"]

view:
  dataview_columns: [validated, needs_validation_by, risk_if_wrong]
  default_sort: [validated asc, date desc]
  group_by: validated

extraction_prompt: |
  Extract ONLY high-risk assumptions — beliefs that, if wrong, would
  force a major architectural change, scope rework, or budget overrun.

  A typical project has 2-5 high-risk assumptions, NOT 20+. Skip:
  - Obvious assumptions ("users have internet", "standard browsers")
  - Low-impact guesses ("the client prefers blue")
  - Anything that, if wrong, is a minor adjustment not a rework

  For each HIGH-RISK assumption, capture:
  - statement: what we believe (1 sentence)
  - basis: why we believe it (industry norm, similar project, client hint…)
  - risk_if_wrong: what breaks — be specific about the rework cost
  - needs_validation_by: who or what would resolve the assumption

  An assumption is a GAP in disguise — an unvalidated belief we're
  building on. Surface it so the PM can confirm or reject it before
  handoff. Don't extract trivial assumptions that nobody would question.
