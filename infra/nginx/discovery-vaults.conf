# nginx config for serving Discovery vault repos over smart-HTTP.
#
# Drop this into /etc/nginx/conf.d/ (or ``include`` from your main
# discovery server block). Two location blocks: ``/vaults/`` for the
# git smart-HTTP traffic, ``/api/internal/`` locked to localhost for
# the auth_request hook.
#
# Prereqs on the host:
#   - ``git-core`` package (provides /usr/lib/git-core/git-http-backend)
#   - ``fcgiwrap`` running on /var/run/fcgiwrap.socket
#   - The bare repos exist at ``<repo>/.runtime/vaults/{id}.git``
#     (created lazily by VaultSync on first commit)
#   - The FastAPI backend is listening on port 8008 with the
#     /api/internal/auth/verify-vault-access endpoint mounted
#
# Test:
#   git -c http.extraHeader="Authorization: Bearer dsc_…" \
#       clone https://discovery-host/vaults/{project_id}.git
#
# A 403 from nginx is the auth_request rejection; 401 from FastAPI
# means the PAT is missing/revoked; 404 means the bare repo doesn't
# exist yet (no pipeline writes happened on that project).

server {
    listen 443 ssl http2;
    server_name discovery-host.example.com;

    # ssl_certificate / ssl_certificate_key set elsewhere

    # Internal-only — auth_request talks here. Refuse everything else.
    location /api/internal/ {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        proxy_pass http://127.0.0.1:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # Vault git smart-HTTP. The auth_request subrequest hits FastAPI;
    # if it returns 200 the request proceeds to git-http-backend.
    # The {project_id} is captured from the path and forwarded as a
    # query parameter on the auth subrequest.
    location ~ ^/vaults/(?<project_id>[0-9a-f-]+)\.git/.* {
        # Ask the backend whether this token has vault access.
        auth_request /_internal/verify-vault-access;
        auth_request_set $auth_status $upstream_status;

        # Pass to git-http-backend via fcgiwrap.
        client_max_body_size 0;          # git pushes can be large
        fastcgi_pass unix:/var/run/fcgiwrap.socket;
        fastcgi_param SCRIPT_FILENAME    /usr/lib/git-core/git-http-backend;
        fastcgi_param GIT_HTTP_EXPORT_ALL "";
        fastcgi_param GIT_PROJECT_ROOT   /path/to/repo/.runtime/vaults;
        fastcgi_param PATH_INFO          $uri;
        fastcgi_param REMOTE_USER        $remote_user;
        fastcgi_param REQUEST_METHOD     $request_method;
        fastcgi_param QUERY_STRING       $query_string;
        fastcgi_param CONTENT_TYPE       $content_type;
        fastcgi_param CONTENT_LENGTH     $content_length;
    }

    # Internal helper for the auth_request above. Rewrites the
    # subrequest URL to include the captured project_id as a query
    # parameter. The /_internal/ prefix is opaque — never reachable
    # from the public side because of the location ordering.
    location = /_internal/verify-vault-access {
        internal;
        proxy_pass http://127.0.0.1:8008/api/internal/auth/verify-vault-access?project_id=$project_id;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Original-URI $request_uri;
    }

    # Everything else (web UI, /api, /mcp, etc.) goes to the backend.
    location / {
        proxy_pass http://127.0.0.1:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_http_version 1.1;
        # SSE for /mcp + streaming chat — disable buffering on these
        # paths or wrap in a separate location block.
        proxy_buffering off;
    }
}
